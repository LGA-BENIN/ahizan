<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_4 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_4" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_4');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Create a modern geometric "Floating Dashboard" representation
const group = new THREE.Group();

// Main card
const cardGeo = new THREE.BoxGeometry(3, 2, 0.1);
const cardMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
const mainCard = new THREE.Mesh(cardGeo, cardMat);
group.add(mainCard);

// Accent elements (Ahizan Red and Blue)
const barGeo = new THREE.BoxGeometry(0.5, 1.5, 0.1);
const redMat = new THREE.MeshPhongMaterial({ color: 0xe31e24 });
const blueMat = new THREE.MeshPhongMaterial({ color: 0x0a192f });

const bar1 = new THREE.Mesh(barGeo, redMat);
bar1.position.set(-1.8, 0.5, 0.2);
group.add(bar1);

const bar2 = new THREE.Mesh(barGeo, blueMat);
bar2.position.set(1.8, -0.5, 0.2);
group.add(bar2);

scene.add(group);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 5;

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y = Math.sin(Date.now() * 0.001) * 0.15;
    group.position.y = Math.sin(Date.now() * 0.002) * 0.1;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_4 -->
</body>
</html>
